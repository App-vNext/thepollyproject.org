<section class="hero">
  <div class="container hero-inner">
    <img class="hero-logo" src="{{ '/assets/images/Polly-Logo.svg' | relative_url }}" alt="Polly logo" width="72" height="72">
    <div>
      <h1 class="hero-title">{{ site.title }}</h1>
      <p class="tagline">{{ site.description | strip_newlines }}</p>
    </div>
  </div>
</section>
